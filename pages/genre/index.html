<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vue d’ensemble · Analyse Genre</title>
  <link rel="stylesheet" href="../../assets/style.css">
</head>

<body data-section="genre" data-page="overview">
  <div class="app-shell">
    <aside class="sidebar" data-site-sidebar></aside>

    <main class="main-area">
      <header class="topbar" data-site-topbar></header>

      <section class="page-body">
        <header class="page-header gender">
          <div class="page-header-inner">
            <h1>Analyse Genre — Vue d’ensemble</h1>
            <p>
              Tableau de bord synthétique de l’analyse conjointe genre au Burkina Faso,
              couvrant les régions enquêtées, les profils des répondants et les principaux constats.
            </p>
          </div>
        </header>

        <section class="kpi-grid">
          <article class="kpi-card">
            <div class="kpi-label">Régions couvertes</div>
            <div class="kpi-value">7</div>
          </article>

          <article class="kpi-card">
            <div class="kpi-label">Groupes analysés</div>
            <div class="kpi-value">4</div>
          </article>

          <article class="kpi-card">
            <div class="kpi-label">Axes d’analyse</div>
            <div class="kpi-value">5</div>
          </article>
        </section>

        <section class="chart-card">
          <div class="chart-card-header">
            <h2>Carte des régions couvertes</h2>
          </div>
          <div class="chart-wrap">
            <div id="burkinaMap" class="map-wrapper"></div>
          </div>
        </section>
      </section>

      <footer class="page-footer" data-site-footer></footer>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="../../assets/dashboard-data.js"></script>
<script src="../../assets/charts.js"></script>
<script src="../../assets/burkina-data.js"></script>
<script src="../../assets/map.js"></script>
<script src="../../assets/page-charts.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      renderBurkinaMap("burkinaMap");
    });
  </script>
</body>
</html>
