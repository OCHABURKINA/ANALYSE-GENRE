<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Protection & VBG · Analyse Genre</title>
  <link rel="stylesheet" href="../../assets/style.css">
</head>

<body data-section="genre" data-page="protection-vbg">
  <div class="app-shell">
    <aside class="sidebar" data-site-sidebar></aside>

    <main class="main-area">
      <header class="topbar" data-site-topbar></header>

      <section class="page-body">
        <header class="page-header gender">
          <div class="page-header-inner">
            <h1>Protection & VBG</h1>
            <p>
              Analyse des risques de protection, violences basées sur le genre,
              mécanismes de référencement et perception de la sécurité.
            </p>
          </div>
        </header>

        <section class="kpi-grid">
          <article class="kpi-card">
            <div class="kpi-label">Régions couvertes</div>
            <div class="kpi-value">7</div>
          </article>

          <article class="kpi-card">
            <div class="kpi-label">Risques analysés</div>
            <div class="kpi-value">5</div>
          </article>

          <article class="kpi-card">
            <div class="kpi-label">Services suivis</div>
            <div class="kpi-value">0</div>
          </article>
        </section>

        <section class="chart-card">
          <div class="chart-card-header">
            <h2>Risques de protection rapportés</h2>
          </div>
          <div class="chart-wrap">
            <canvas id="protectionChart"></canvas>
          </div>
        </section>

        <section class="chart-card">
          <div class="chart-card-header">
            <h2>Niveau d’exposition aux risques</h2>
          </div>
          <div class="chart-wrap">
            <canvas id="riskRadarChart"></canvas>
          </div>
        </section>

        <section class="chart-card">
          <div class="chart-card-header">
            <h2>Carte des régions couvertes</h2>
          </div>
          <div class="chart-wrap">
            <div id="burkinaMap" class="map-wrapper"></div>
          </div>
        </section>
      </section>

      <footer class="page-footer" data-site-footer></footer>
    </main>
  </div>

  <script src="../../assets/ocha-icons.js"></script>
  <script src="../../assets/layout.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="../../assets/dashboard-data.js"></script>
  <script src="../../assets/charts.js"></script>

  <script src="../../assets/burkina-data.js"></script>
  <script src="../../assets/map.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      createHorizontalBarChart(
        "protectionChart",
        [
          "VBG",
          "Mariage précoce",
          "Insécurité dans les déplacements",
          "Exploitation / abus",
          "Accès limité aux services"
        ],
        [0, 0, 0, 0, 0],
        OCHA.purple2,
        {
          ariaLabel: "Graphique des risques de protection et de VBG",
          label: "Pourcentage",
          unit: "%",
          max: 100,
          showLabels: true
        }
      );

      createRadarChart(
        "riskRadarChart",
        [
          "Sécurité",
          "Accès aux services",
          "Référencement",
          "Prévention VBG",
          "Information"
        ],
        [0, 0, 0, 0, 0],
        OCHA.purple2,
        {
          ariaLabel: "Radar du niveau d’exposition aux risques de protection",
          label: "Niveau",
          unit: "%",
          max: 100
        }
      );

      renderBurkinaMap("burkinaMap");
    });
  </script>
</body>
</html>
